<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Indice</title>
    <style>
      body {
        margin: 0;
        font-family: Georgia, "Times New Roman", Times, serif;
        background: linear-gradient(
          135deg,
          #f7f9f2 0%,
          #e9efe2 50%,
          #d6e3d0 100%
        );
        min-height: 100vh;
        display: grid;
        place-items: center;
      }

      main {
        background: #ffffffd9;
        border: 1px solid #a4b494;
        border-radius: 14px;
        padding: 2rem;
        max-width: 640px;
        box-shadow: 0 16px 30px rgba(59, 77, 52, 0.12);
        text-align: center;
      }

      h1 {
        margin-top: 0;
      }

      a {
        display: inline-block;
        margin-top: 1rem;
        padding: 0.7rem 1rem;
        border-radius: 10px;
        border: 1px solid #2f5d50;
        background: #2f5d50;
        color: #fff;
        text-decoration: none;
        font-weight: 700;
      }

      a:hover {
        background: #22443a;
      }

      .actions {
        display: flex;
        justify-content: center;
        gap: 0.75rem;
        flex-wrap: wrap;
      }

      .lang-switch {
        margin-top: 1rem;
      }

      .lang-switch label {
        display: block;
        margin-bottom: 0.4rem;
        font-weight: 700;
        color: #2f5d50;
      }

      .lang-switch select {
        width: min(280px, 100%);
        padding: 0.55rem 0.7rem;
        border-radius: 10px;
        border: 1px solid #2f5d50;
        background: #fff;
        color: #1f3f36;
        font: inherit;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Indice</h1>
      <p>Abre la pagina principal de PPLE a continuacion.</p>
      <div class="actions">
        <a href="PPLE-Home.html">Ir a PPLE Home</a>
      </div>
      <div class="lang-switch">
        <label for="language-select">Idioma</label>
        <select id="language-select" aria-label="Seleccionar idioma">
          <option value="../en/index.html">English</option>
          <option value="../es/index.html" selected>Español</option>
          <option value="../pt/index.html">Português</option>
        </select>
      </div>
    </main>

    <script>
      const languageSelect = document.getElementById("language-select");
      languageSelect.addEventListener("change", (event) => {
        window.location.href = event.target.value;
      });
    </script>
  </body>
</html>
