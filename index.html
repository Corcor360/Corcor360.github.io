<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="refresh" content="5; url=en/index.html" />
    <title>Redirecting to English Home</title>
    <style>
      body {
        margin: 0;
        font-family: Georgia, "Times New Roman", Times, serif;
        background: linear-gradient(
          135deg,
          #f7f9f2 0%,
          #e9efe2 50%,
          #d6e3d0 100%
        );
        min-height: 100vh;
        display: grid;
        place-items: center;
      }

      main {
        background: #ffffffd9;
        border: 1px solid #a4b494;
        border-radius: 14px;
        padding: 2rem;
        max-width: 680px;
        box-shadow: 0 16px 30px rgba(59, 77, 52, 0.12);
        text-align: center;
      }

      .lang-switch {
        margin-top: 1rem;
      }

      .lang-switch label {
        display: block;
        margin-bottom: 0.4rem;
        font-weight: 700;
        color: #2f5d50;
      }

      .lang-switch select {
        width: min(280px, 100%);
        padding: 0.55rem 0.7rem;
        border-radius: 10px;
        border: 1px solid #2f5d50;
        background: #fff;
        color: #1f3f36;
        font: inherit;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Redirecting...</h1>
      <p>
        English is the default language. Redirecting in 5 seconds, or choose a
        language below.
      </p>
      <div class="lang-switch">
        <label for="language-select">Language</label>
        <select id="language-select" aria-label="Select language">
          <option value="en/index.html" selected>English</option>
          <option value="es/index.html">Español</option>
          <option value="pt/index.html">Português</option>
        </select>
      </div>
    </main>

    <script>
      const languageSelect = document.getElementById("language-select");
      languageSelect.addEventListener("change", (event) => {
        window.location.href = event.target.value;
      });
    </script>
  </body>
</html>
