<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Website</title>
    <style>
      body {
        margin: 0;
        font-family: Georgia, "Times New Roman", Times, serif;
        background: linear-gradient(
          135deg,
          #f7f9f2 0%,
          #e9efe2 50%,
          #d6e3d0 100%
        );
        min-height: 100vh;
        display: grid;
        place-items: center;
      }

      main {
        background: #ffffffd9;
        border: 1px solid #a4b494;
        border-radius: 14px;
        padding: 2rem;
        max-width: 640px;
        box-shadow: 0 16px 30px rgba(59, 77, 52, 0.12);
        text-align: center;
      }

      h1 {
        margin-top: 0;
      }

      a {
        display: inline-block;
        margin-top: 1rem;
        padding: 0.7rem 1rem;
        border-radius: 10px;
        border: 1px solid #2f5d50;
        background: #2f5d50;
        color: #fff;
        text-decoration: none;
        font-weight: 700;
      }

      a:hover {
        background: #22443a;
      }

      .actions {
        display: flex;
        justify-content: center;
        gap: 0.75rem;
        flex-wrap: wrap;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Welcome to My Website!</h1>
      <p>This is hosted on GitHub Pages.</p>
      <div class="actions">
        <a href="vs-tracker.html">Open VS Tracker Page</a>
        <a href="vs-archive.html">Open VS Archive Page</a>
      </div>
    </main>
  </body>
</html>
