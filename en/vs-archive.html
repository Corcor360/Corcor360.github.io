<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>VS Archive</title>
    <link rel="stylesheet" href="../vs-tracker.css" />
    <style>
      .lang-switch {
        margin: 0.75rem 0 1.25rem;
      }

      .lang-switch label {
        display: inline-block;
        margin-right: 0.55rem;
        font-weight: 700;
      }

      .lang-switch select {
        width: min(280px, 100%);
        padding: 0.45rem 0.6rem;
        border-radius: 8px;
        border: 1px solid #3d5f56;
        background: #fff;
        color: #1f3f36;
        font: inherit;
      }
    </style>
  </head>
  <body>
    <main class="page">
      <div class="title-row">
        <h1>VS Archive</h1>
        <a class="back-link" href="PPLE-Home.html">Back to Home</a>
      </div>

      <p class="subtitle">
        Select a saved week below. CSV files are loaded from
        <strong>data/vs-archive/</strong> based on
        <strong>data/vs-archive/manifest.json</strong>.
      </p>
      <div class="lang-switch">
        <label for="language-select">Language</label>
        <select id="language-select" aria-label="Select language">
          <option value="../en/vs-archive.html" selected>English</option>
          <option value="../es/vs-archive.html">Español</option>
          <option value="../pt/vs-archive.html">Português</option>
        </select>
      </div>

      <section class="archive-controls" aria-label="Archive period selector">
        <label for="week-select">Week</label>
        <select id="week-select" disabled>
          <option value="">Loading archive list...</option>
        </select>
      </section>

      <div class="table-wrap">
        <table aria-label="VS archive rankings">
          <thead>
            <tr>
              <th scope="col">Rank</th>
              <th scope="col">Username</th>
              <th scope="col">Radar</th>
              <th scope="col">Construction</th>
              <th scope="col">Tech</th>
              <th scope="col">Hero</th>
              <th scope="col">Mobilization</th>
              <th scope="col">Buster</th>
              <th scope="col">Daily Average</th>
              <th scope="col">Total Score</th>
            </tr>
          </thead>
          <tbody id="tracker-body"></tbody>
        </table>
      </div>

      <p id="status-message" class="status" role="status" aria-live="polite">
        Loading archive manifest...
      </p>

      <p class="note">Ranks are displayed from 1 to 100.</p>
    </main>

    <script>
      const tableBody = document.getElementById("tracker-body");
      const statusMessage = document.getElementById("status-message");
      const languageSelect = document.getElementById("language-select");
      languageSelect.addEventListener("change", (event) => {
        window.location.href = event.target.value;
      });
      const weekSelect = document.getElementById("week-select");
      const manifestUrl = "../data/vs-archive/manifest.json";
      const archiveBasePath = "../data/vs-archive/";
      const locale = "en";
      const numberLocale = "en-US";
      const expectedColumns = [
        "rank",
        "username",
        "radar",
        "construction",
        "tech",
        "hero",
        "mobilization",
        "buster",
        "daily average",
        "total score",
      ];
      const MESSAGES = {
        loadingManifest: "Loading archive manifest...",
        loadingList: "Loading archive list...",
        noEntriesOption: "No archive entries found",
        manifestFailedOption: "Manifest load failed",
        weekLabel: "Week",
        http: (status) => `HTTP ${status}`,
        csvMissingRows: "CSV is empty or missing data rows.",
        missingUsername: "CSV must include a Username column.",
        noValidRows: "No valid rows found in the CSV.",
        loadingCsv: (label) => `Loading ${label}...`,
        loadedRows: (rowCount, label) =>
          `Loaded ${rowCount} rows for ${label}. Rank is auto-generated 1-100.`,
        csvLoadError: (label, message) =>
          `Unable to load CSV for ${label}. ${message}`,
        noEntriesStatus:
          "No archive entries found. Add entries to data/vs-archive/manifest.json.",
        manifestLoadError: (message) =>
          `Unable to load archive manifest. ${message}`,
      };

      function setStatus(message, type) {
        statusMessage.textContent = message;
        statusMessage.className = "status";
        if (type) {
          statusMessage.classList.add(type);
        }
      }

      function normalizeHeader(value) {
        return value
          .toLowerCase()
          .trim()
          .replace(/[^a-z0-9]/g, "");
      }

      function parseCsvLine(line) {
        const values = [];
        let current = "";
        let inQuotes = false;

        for (let i = 0; i < line.length; i += 1) {
          const char = line[i];

          if (char === '"') {
            if (inQuotes && line[i + 1] === '"') {
              current += '"';
              i += 1;
            } else {
              inQuotes = !inQuotes;
            }
            continue;
          }

          if (char === "," && !inQuotes) {
            values.push(current);
            current = "";
            continue;
          }

          current += char;
        }

        values.push(current);
        return values;
      }

      function parseCsv(text) {
        return text
          .split(/\r?\n/)
          .filter((line) => line.trim() !== "")
          .map((line) => parseCsvLine(line).map((cell) => cell.trim()));
      }

      function toNumber(value) {
        if (value === null || value === undefined) {
          return null;
        }
        const normalized = String(value).replace(/,/g, "").trim();
        if (normalized === "") {
          return null;
        }
        const num = Number(normalized);
        return Number.isFinite(num) ? num : null;
      }

      function formatScore(value, fractionDigits = null, roundUp = false) {
        const numericValue = toNumber(value);
        if (numericValue === null) {
          return value;
        }

        const displayValue = roundUp ? Math.ceil(numericValue) : numericValue;

        if (fractionDigits !== null) {
          return displayValue.toLocaleString(numberLocale, {
            minimumFractionDigits: fractionDigits,
            maximumFractionDigits: fractionDigits,
          });
        }

        return displayValue.toLocaleString(numberLocale);
      }

      function buildHeaderMap(headerRow) {
        const normalizedHeader = headerRow.map((value) =>
          normalizeHeader(value),
        );
        const aliases = {
          rank: ["rank"],
          username: ["username", "user", "name"],
          radar: ["radar", "monday", "mon"],
          construction: ["construction", "tuesday", "tue", "tues"],
          tech: ["tech", "wednesday", "wed"],
          hero: ["hero", "thursday", "thu", "thur", "thurs"],
          mobilization: ["mobilization", "friday", "fri"],
          buster: ["buster", "saturday", "sat"],
          "daily average": ["dailyaverage", "average", "avg"],
          "total score": ["totalscore", "total"],
        };

        const map = {};

        for (const key of expectedColumns) {
          const aliasList = aliases[key] || [key];
          map[key] = normalizedHeader.findIndex((headerName) =>
            aliasList.includes(headerName),
          );
        }

        return map;
      }

      function getValue(cells, index) {
        if (index < 0 || index >= cells.length) {
          return "";
        }
        return cells[index] || "";
      }

      function renderRows(rows) {
        tableBody.innerHTML = "";

        function getDailyScoreClass(value) {
          const numericValue = toNumber(value);
          if (numericValue === null) {
            return "";
          }
          if (numericValue < 3600000) {
            return "score-red";
          }
          if (numericValue < 7200000) {
            return "score-orange";
          }
          return "score-green";
        }

        function getWeeklyTotalClass(value) {
          const numericValue = toNumber(value);
          if (numericValue === null) {
            return "";
          }
          if (numericValue < 43200000) {
            return "score-red";
          }
          return "score-green";
        }

        rows.forEach((rowData) => {
          const row = document.createElement("tr");

          rowData.forEach((value, index) => {
            const cell = document.createElement("td");
            cell.textContent = value;
            if (index === 1) {
              cell.className = "name-col";
            }
            if (index >= 2 && index <= 8) {
              const scoreClass = getDailyScoreClass(value);
              if (scoreClass) {
                cell.classList.add(scoreClass);
              }
            }
            if (index === 9) {
              const totalClass = getWeeklyTotalClass(value);
              if (totalClass) {
                cell.classList.add(totalClass);
              }
            }
            row.appendChild(cell);
          });

          tableBody.appendChild(row);
        });
      }

      function getEntryLabel(entry) {
        if (entry.labels && typeof entry.labels === "object") {
          if (
            typeof entry.labels[locale] === "string" &&
            entry.labels[locale].trim() !== ""
          ) {
            return entry.labels[locale];
          }
          if (
            typeof entry.labels.en === "string" &&
            entry.labels.en.trim() !== ""
          ) {
            return entry.labels.en;
          }
        }
        return typeof entry.label === "string" ? entry.label : "";
      }

      function getEntryCsvPath(entry) {
        if (typeof entry.csv !== "string") {
          return "";
        }
        const value = entry.csv.trim();
        if (!value) {
          return "";
        }
        if (/^https?:\/\//i.test(value)) {
          return value;
        }
        if (value.includes("/")) {
          return value;
        }
        return `${archiveBasePath}${value}`;
      }

      function isValidManifestEntry(entry) {
        if (!entry || typeof entry !== "object") {
          return false;
        }
        const label = getEntryLabel(entry);
        return label !== "" && getEntryCsvPath(entry) !== "";
      }

      function buildArchiveOptions(entries) {
        weekSelect.innerHTML = "";

        entries.forEach((entry, index) => {
          const option = document.createElement("option");
          option.value = String(index);
          option.textContent = getEntryLabel(entry);
          weekSelect.appendChild(option);
        });

        weekSelect.disabled = entries.length === 0;
      }

      async function loadArchiveCsv(entry) {
        const label = getEntryLabel(entry);
        const csvPath = getEntryCsvPath(entry);

        try {
          setStatus(MESSAGES.loadingCsv(label));
          const response = await fetch(csvPath, { cache: "no-store" });

          if (!response.ok) {
            throw new Error(MESSAGES.http(response.status));
          }

          const csvText = await response.text();
          const parsed = parseCsv(csvText);

          if (parsed.length < 2) {
            throw new Error(MESSAGES.csvMissingRows);
          }

          const headerMap = buildHeaderMap(parsed[0]);

          if (headerMap.username === -1) {
            throw new Error(MESSAGES.missingUsername);
          }

          const dataRows = [];

          for (let i = 1; i < parsed.length; i += 1) {
            const cells = parsed[i];
            const hasAnyValue = cells.some((value) => value.trim() !== "");
            if (!hasAnyValue) {
              continue;
            }

            const username = getValue(cells, headerMap.username);
            const radar = getValue(cells, headerMap.radar);
            const construction = getValue(cells, headerMap.construction);
            const tech = getValue(cells, headerMap.tech);
            const hero = getValue(cells, headerMap.hero);
            const mobilization = getValue(cells, headerMap.mobilization);
            const buster = getValue(cells, headerMap.buster);

            let dailyAverage = getValue(cells, headerMap["daily average"]);
            let totalScore = getValue(cells, headerMap["total score"]);

            const dayNumbers = [
              toNumber(radar),
              toNumber(construction),
              toNumber(tech),
              toNumber(hero),
              toNumber(mobilization),
              toNumber(buster),
            ];
            const validDayNumbers = dayNumbers.filter(
              (value) => value !== null,
            );

            if (!dailyAverage && validDayNumbers.length > 0) {
              const sum = validDayNumbers.reduce(
                (acc, value) => acc + value,
                0,
              );
              dailyAverage = (sum / validDayNumbers.length).toFixed(2);
            }

            if (!totalScore && validDayNumbers.length > 0) {
              totalScore = String(
                validDayNumbers.reduce((acc, value) => acc + value, 0),
              );
            }

            const computedWeeklyTotal =
              toNumber(totalScore) ??
              validDayNumbers.reduce((acc, value) => acc + value, 0);

            dataRows.push({
              username,
              radar,
              construction,
              tech,
              hero,
              mobilization,
              buster,
              dailyAverage,
              totalScore,
              weeklyTotal: computedWeeklyTotal,
            });
          }

          if (dataRows.length === 0) {
            throw new Error(MESSAGES.noValidRows);
          }

          dataRows.sort((a, b) => b.weeklyTotal - a.weeklyTotal);

          const rankedRows = dataRows
            .slice(0, 100)
            .map((row, index) => [
              index + 1,
              row.username,
              row.radar,
              row.construction,
              row.tech,
              row.hero,
              row.mobilization,
              row.buster,
              formatScore(row.dailyAverage, null, true),
              formatScore(row.totalScore),
            ]);

          renderRows(rankedRows);
          setStatus(MESSAGES.loadedRows(rankedRows.length, label), "success");
        } catch (error) {
          tableBody.innerHTML = "";
          setStatus(MESSAGES.csvLoadError(label, error.message), "error");
        }
      }

      async function loadArchiveManifest() {
        setStatus(MESSAGES.loadingManifest);

        try {
          const response = await fetch(manifestUrl, { cache: "no-store" });
          if (!response.ok) {
            throw new Error(MESSAGES.http(response.status));
          }

          const manifest = await response.json();
          if (!Array.isArray(manifest)) {
            throw new Error("Manifest must be an array of entries.");
          }

          const validEntries = manifest.filter(isValidManifestEntry);

          if (validEntries.length === 0) {
            tableBody.innerHTML = "";
            weekSelect.innerHTML = `<option value="">${MESSAGES.noEntriesOption}</option>`;
            weekSelect.disabled = true;
            setStatus(MESSAGES.noEntriesStatus, "error");
            return;
          }

          buildArchiveOptions(validEntries);

          weekSelect.addEventListener("change", () => {
            const entry = validEntries[Number(weekSelect.value)];
            if (!entry) {
              return;
            }
            loadArchiveCsv(entry);
          });

          const firstEntry = validEntries[0];
          weekSelect.value = "0";
          await loadArchiveCsv(firstEntry);
        } catch (error) {
          tableBody.innerHTML = "";
          weekSelect.innerHTML = `<option value="">${MESSAGES.manifestFailedOption}</option>`;
          weekSelect.disabled = true;
          setStatus(MESSAGES.manifestLoadError(error.message), "error");
        }
      }

      loadArchiveManifest();
    </script>
  </body>
</html>
