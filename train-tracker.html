<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Train Tracker</title>
    <link rel="stylesheet" href="vs-tracker.css" />
    <style>
      .train-table thead th {
        background: #1f4e79;
        color: #ffffff;
      }

      .train-table tbody tr:nth-child(odd) {
        background: #f3f8fd;
      }

      .train-table tbody tr:nth-child(even) {
        background: #e7f1fb;
      }

      .train-table tbody tr:hover {
        background: #d7e8fa;
      }

      .train-table tbody tr:nth-child(odd) td:nth-child(2) {
        background: #f3f8fd;
      }

      .train-table tbody tr:nth-child(even) td:nth-child(2) {
        background: #e7f1fb;
      }

      .train-table tbody tr:hover td:nth-child(2) {
        background: #d7e8fa;
      }

      .train-table td.name-col {
        text-align: center;
      }

      .train-table {
        min-width: 0;
        width: 100%;
        table-layout: fixed;
      }

      .train-table th,
      .train-table td {
        white-space: normal;
        padding: 0.45rem 0.4rem;
      }

      .train-table thead th:nth-child(2),
      .train-table tbody td:nth-child(2) {
        position: static;
        left: auto;
        box-shadow: none;
      }

      .train-table th:nth-child(1),
      .train-table td:nth-child(1) {
        width: 30%;
      }

      .train-table th:nth-child(2),
      .train-table td:nth-child(2) {
        width: 35%;
      }

      .train-table th:nth-child(3),
      .train-table td:nth-child(3) {
        width: 35%;
      }

      @media (max-width: 720px) {
        .train-table th,
        .train-table td {
          padding: 0.35rem 0.3rem;
          font-size: 0.82rem;
        }
      }
    </style>
  </head>
  <body>
    <main class="page">
      <div class="title-row">
        <h1>Train Tracker</h1>
        <a class="back-link" href="PPLE-Home.html">Back to Home</a>
      </div>

      <p class="subtitle">
        Live table populated from a published Google Sheets CSV source.
      </p>

      <div class="table-wrap">
        <table class="train-table" aria-label="Train tracker records">
          <thead>
            <tr>
              <th scope="col">Date</th>
              <th scope="col">Conductor</th>
              <th scope="col">VIP</th>
            </tr>
          </thead>
          <tbody id="tracker-body"></tbody>
        </table>
      </div>

      <p id="status-message" class="status" role="status" aria-live="polite">
        Loading train tracker data...
      </p>

      <p class="note">Source: Google Sheets published CSV.</p>
    </main>

    <script>
      const tableBody = document.getElementById("tracker-body");
      const statusMessage = document.getElementById("status-message");
      const csvUrl =
        "https://docs.google.com/spreadsheets/d/e/2PACX-1vQU6Du4tIuOoUGSLdggDJE1cA00Hs_Ujj1XcmSIklAEJyYLBFCYlreSW0ccCLSc6yN_r3WCB1FFSP9z/pub?output=csv";
      const expectedColumns = ["date", "conductor", "vip"];

      function setStatus(message, type) {
        statusMessage.textContent = message;
        statusMessage.className = "status";
        if (type) {
          statusMessage.classList.add(type);
        }
      }

      function normalizeHeader(value) {
        return value
          .toLowerCase()
          .trim()
          .replace(/[^a-z0-9]/g, "");
      }

      function parseCsvLine(line) {
        const values = [];
        let current = "";
        let inQuotes = false;

        for (let i = 0; i < line.length; i += 1) {
          const char = line[i];

          if (char === '"') {
            if (inQuotes && line[i + 1] === '"') {
              current += '"';
              i += 1;
            } else {
              inQuotes = !inQuotes;
            }
            continue;
          }

          if (char === "," && !inQuotes) {
            values.push(current);
            current = "";
            continue;
          }

          current += char;
        }

        values.push(current);
        return values;
      }

      function parseCsv(text) {
        return text
          .split(/\r?\n/)
          .filter((line) => line.trim() !== "")
          .map((line) => parseCsvLine(line).map((cell) => cell.trim()));
      }

      function buildHeaderMap(headerRow) {
        const normalizedHeader = headerRow.map((value) =>
          normalizeHeader(value),
        );
        const aliases = {
          date: ["date", "day"],
          conductor: ["conductor", "driver", "name"],
          vip: ["vip", "status", "tier"],
        };

        const map = {};

        for (const key of expectedColumns) {
          const aliasList = aliases[key] || [key];
          map[key] = normalizedHeader.findIndex((headerName) =>
            aliasList.includes(headerName),
          );
        }

        return map;
      }

      function getValue(cells, index) {
        if (index < 0 || index >= cells.length) {
          return "";
        }
        return cells[index] || "";
      }

      function parseDateValue(value) {
        const raw = String(value || "").trim();
        if (!raw) {
          return null;
        }

        const isoMatch = raw.match(/^(\d{4})-(\d{1,2})-(\d{1,2})$/);
        if (isoMatch) {
          const year = Number(isoMatch[1]);
          const month = Number(isoMatch[2]);
          const day = Number(isoMatch[3]);
          const timestamp = Date.UTC(year, month - 1, day);
          const normalized = new Date(timestamp);
          if (
            normalized.getUTCFullYear() === year &&
            normalized.getUTCMonth() === month - 1 &&
            normalized.getUTCDate() === day
          ) {
            return timestamp;
          }
        }

        const match = raw.match(/^(\d{1,2})\/(\d{1,2})\/(\d{2,4})$/);
        if (match) {
          const month = Number(match[1]);
          const day = Number(match[2]);
          let year = Number(match[3]);

          if (year < 100) {
            year += year >= 70 ? 1900 : 2000;
          }

          const timestamp = Date.UTC(year, month - 1, day);
          const normalized = new Date(timestamp);
          if (
            normalized.getUTCFullYear() === year &&
            normalized.getUTCMonth() === month - 1 &&
            normalized.getUTCDate() === day
          ) {
            return timestamp;
          }
        }

        const numericRaw = Number(raw);
        if (Number.isFinite(numericRaw)) {
          if (numericRaw >= 25000 && numericRaw <= 80000) {
            return Date.UTC(1899, 11, 30) + numericRaw * 24 * 60 * 60 * 1000;
          }
          if (numericRaw >= 1000000000000) {
            return numericRaw;
          }
          if (numericRaw >= 1000000000) {
            return numericRaw * 1000;
          }
        }

        const parsed = Date.parse(raw);
        if (!Number.isNaN(parsed)) {
          return parsed;
        }

        return null;
      }

      function formatDateForDisplay(value, timestamp) {
        if (timestamp === null) {
          return String(value || "");
        }

        return new Intl.DateTimeFormat("en-US", {
          month: "long",
          day: "numeric",
          year: "numeric",
          timeZone: "UTC",
        }).format(new Date(timestamp));
      }

      function renderRows(rows) {
        tableBody.innerHTML = "";

        rows.forEach((rowData) => {
          const row = document.createElement("tr");

          rowData.forEach((value, index) => {
            const cell = document.createElement("td");
            cell.textContent = value;
            if (index === 1) {
              cell.classList.add("name-col");
            }
            row.appendChild(cell);
          });

          tableBody.appendChild(row);
        });
      }

      async function loadTrainData() {
        setStatus("Loading train tracker data...");

        try {
          const response = await fetch(csvUrl, { cache: "no-store" });
          if (!response.ok) {
            throw new Error(`Request failed with status ${response.status}`);
          }

          const csvText = await response.text();
          const rows = parseCsv(csvText);

          if (rows.length < 2) {
            throw new Error("CSV contains no data rows.");
          }

          const [headerRow, ...dataRows] = rows;
          const headerMap = buildHeaderMap(headerRow);
          const missingColumns = expectedColumns.filter(
            (column) => headerMap[column] < 0,
          );

          if (missingColumns.length > 0) {
            throw new Error(
              `Missing required columns: ${missingColumns.join(", ")}.`,
            );
          }

          const normalizedRows = dataRows.map((cells, index) => {
            const dateValue = getValue(cells, headerMap.date);
            const timestamp = parseDateValue(dateValue);
            return {
              row: [
                formatDateForDisplay(dateValue, timestamp),
                getValue(cells, headerMap.conductor),
                getValue(cells, headerMap.vip),
              ],
              timestamp,
              originalIndex: index,
            };
          });

          normalizedRows.sort((a, b) => {
            const aHasDate = a.timestamp !== null;
            const bHasDate = b.timestamp !== null;

            if (aHasDate && bHasDate) {
              return b.timestamp - a.timestamp;
            }
            if (aHasDate) {
              return -1;
            }
            if (bHasDate) {
              return 1;
            }

            return a.originalIndex - b.originalIndex;
          });

          renderRows(normalizedRows.map((entry) => entry.row));
          setStatus(
            `Loaded ${normalizedRows.length} rows (most recent date first).`,
            "success",
          );
        } catch (error) {
          tableBody.innerHTML = "";
          setStatus(
            `Unable to load train tracker data. ${error.message}`,
            "error",
          );
        }
      }

      loadTrainData();
    </script>
  </body>
</html>
