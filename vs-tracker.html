<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>VS Tracker Page</title>
    <style>
      :root {
        --bg-1: #f6f3ea;
        --bg-2: #d9e4dd;
        --ink: #1f2a21;
        --accent: #2f5d50;
        --accent-soft: #dce8e2;
        --line: #96a99b;
        --card: #ffffffd9;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        color: var(--ink);
        font-family: "Palatino Linotype", Palatino, "Book Antiqua", serif;
        background:
          radial-gradient(circle at 20% 20%, #ffffff80 0%, #ffffff00 45%),
          radial-gradient(circle at 80% 0%, #bdd0c480 0%, #ffffff00 40%),
          linear-gradient(145deg, var(--bg-1) 0%, var(--bg-2) 100%);
      }

      .page {
        width: min(1200px, 94vw);
        margin: 2rem auto;
        padding: 1.2rem;
        background: var(--card);
        border: 1px solid var(--line);
        border-radius: 16px;
        box-shadow: 0 18px 30px rgba(43, 58, 48, 0.12);
        animation: fade-slide 500ms ease both;
      }

      @keyframes fade-slide {
        from {
          opacity: 0;
          transform: translateY(12px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      .title-row {
        display: flex;
        flex-wrap: wrap;
        gap: 0.8rem;
        align-items: center;
        justify-content: space-between;
      }

      h1 {
        margin: 0;
        font-size: clamp(1.4rem, 2.4vw, 2rem);
        letter-spacing: 0.02em;
      }

      .back-link {
        text-decoration: none;
        color: #fff;
        background: var(--accent);
        border: 1px solid var(--accent);
        border-radius: 10px;
        padding: 0.5rem 0.9rem;
        font-weight: 700;
      }

      .back-link:hover {
        background: #23463c;
      }

      .subtitle {
        margin-top: 0.55rem;
        margin-bottom: 1rem;
      }

      .table-wrap {
        overflow-x: auto;
        border: 1px solid var(--line);
        border-radius: 12px;
      }

      table {
        width: 100%;
        border-collapse: collapse;
        min-width: 980px;
      }

      thead th {
        position: sticky;
        top: 0;
        background: var(--accent-soft);
        color: #183329;
        font-size: 0.95rem;
      }

      th,
      td {
        border-bottom: 1px solid #b8c8bc;
        border-right: 1px solid #c9d6cc;
        padding: 0.55rem 0.6rem;
        text-align: center;
        white-space: nowrap;
      }

      th:last-child,
      td:last-child {
        border-right: 0;
      }

      tbody tr:nth-child(odd) {
        background: #fbfdf9;
      }

      tbody tr:hover {
        background: #ecf4ee;
      }

      .name-col {
        text-align: left;
      }

      .note {
        margin-top: 0.8rem;
        font-size: 0.9rem;
      }

      @media (max-width: 720px) {
        .page {
          margin: 1rem auto;
          padding: 0.8rem;
        }

        th,
        td {
          padding: 0.45rem;
          font-size: 0.88rem;
        }
      }
    </style>
  </head>
  <body>
    <main class="page">
      <div class="title-row">
        <h1>VS Tracker Page</h1>
        <a class="back-link" href="index.html">Back to Home</a>
      </div>
      <p class="subtitle">
        10-column tracker: Rank, Username, Monday-Saturday, Daily Average, and
        Total Score.
      </p>

      <div class="table-wrap">
        <table aria-label="VS tracker rankings">
          <thead>
            <tr>
              <th>Rank</th>
              <th>Username</th>
              <th>Monday</th>
              <th>Tuesday</th>
              <th>Wednesday</th>
              <th>Thursday</th>
              <th>Friday</th>
              <th>Saturday</th>
              <th>Daily Average</th>
              <th>Total Score</th>
            </tr>
          </thead>
          <tbody id="tracker-body"></tbody>
        </table>
      </div>

      <p class="note">Ranks are displayed from 1 to 100.</p>
    </main>

    <script>
      const tableBody = document.getElementById("tracker-body");
      const days = [
        "monday",
        "tuesday",
        "wednesday",
        "thursday",
        "friday",
        "saturday",
      ];

      function makeScore(rank, dayIndex) {
        // Create deterministic sample values for a stable leaderboard.
        const base = 130 - rank;
        const variation = ((rank * 11 + dayIndex * 17) % 29) - 14;
        return Math.max(0, base + variation);
      }

      for (let rank = 1; rank <= 100; rank += 1) {
        const row = document.createElement("tr");
        const username = `user_${String(rank).padStart(3, "0")}`;

        const scores = days.map((_, dayIndex) => makeScore(rank, dayIndex));
        const total = scores.reduce((sum, score) => sum + score, 0);
        const average = (total / scores.length).toFixed(2);

        const cells = [rank, username, ...scores, average, total];

        cells.forEach((value, index) => {
          const cell = document.createElement("td");
          cell.textContent = value;
          if (index === 1) {
            cell.className = "name-col";
          }
          row.appendChild(cell);
        });

        tableBody.appendChild(row);
      }
    </script>
  </body>
</html>
