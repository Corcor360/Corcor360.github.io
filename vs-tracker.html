<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>VS Tracker Page</title>
    <style>
      :root {
        --bg-1: #f6f3ea;
        --bg-2: #d9e4dd;
        --ink: #1f2a21;
        --accent: #2f5d50;
        --accent-soft: #dce8e2;
        --line: #96a99b;
        --card: #ffffffd9;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        color: var(--ink);
        font-family: "Palatino Linotype", Palatino, "Book Antiqua", serif;
        background:
          radial-gradient(circle at 20% 20%, #ffffff80 0%, #ffffff00 45%),
          radial-gradient(circle at 80% 0%, #bdd0c480 0%, #ffffff00 40%),
          linear-gradient(145deg, var(--bg-1) 0%, var(--bg-2) 100%);
      }

      .page {
        width: min(1200px, 94vw);
        margin: 2rem auto;
        padding: 1.2rem;
        background: var(--card);
        border: 1px solid var(--line);
        border-radius: 16px;
        box-shadow: 0 18px 30px rgba(43, 58, 48, 0.12);
        animation: fade-slide 500ms ease both;
      }

      @keyframes fade-slide {
        from {
          opacity: 0;
          transform: translateY(12px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      .title-row {
        display: flex;
        flex-wrap: wrap;
        gap: 0.8rem;
        align-items: center;
        justify-content: space-between;
      }

      h1 {
        margin: 0;
        font-size: clamp(1.4rem, 2.4vw, 2rem);
        letter-spacing: 0.02em;
      }

      .back-link {
        text-decoration: none;
        color: #fff;
        background: var(--accent);
        border: 1px solid var(--accent);
        border-radius: 10px;
        padding: 0.5rem 0.9rem;
        font-weight: 700;
      }

      .back-link:hover {
        background: #23463c;
      }

      .subtitle {
        margin-top: 0.55rem;
        margin-bottom: 1rem;
      }

      .table-wrap {
        overflow-x: auto;
        border: 1px solid var(--line);
        border-radius: 12px;
      }

      table {
        width: 100%;
        border-collapse: collapse;
        min-width: 980px;
      }

      thead th {
        position: sticky;
        top: 0;
        background: var(--accent-soft);
        color: #183329;
        font-size: 0.95rem;
      }

      th,
      td {
        border-bottom: 1px solid #b8c8bc;
        border-right: 1px solid #c9d6cc;
        padding: 0.55rem 0.6rem;
        text-align: center;
        white-space: nowrap;
      }

      th:last-child,
      td:last-child {
        border-right: 0;
      }

      tbody tr:nth-child(odd) {
        background: #fbfdf9;
      }

      tbody tr:hover {
        background: #ecf4ee;
      }

      .name-col {
        text-align: left;
      }

      .score-red {
        background: #f7d9d9;
        color: #7a1f1f;
        font-weight: 700;
      }

      .score-orange {
        background: #fbe8cc;
        color: #7a4a07;
        font-weight: 700;
      }

      .score-green {
        background: #dff3e4;
        color: #165a2d;
        font-weight: 700;
      }

      .note {
        margin-top: 0.8rem;
        font-size: 0.9rem;
      }

      .status {
        margin-top: 0.8rem;
        margin-bottom: 0;
        padding: 0.55rem 0.7rem;
        border-radius: 9px;
        border: 1px solid #bfd2c4;
        background: #eef5f0;
        font-size: 0.9rem;
      }

      .status.error {
        border-color: #c98080;
        background: #faecec;
        color: #6b1e1e;
      }

      .status.success {
        border-color: #8db59f;
        background: #e8f4ec;
        color: #1f4b32;
      }

      @media (max-width: 720px) {
        .page {
          margin: 1rem auto;
          padding: 0.8rem;
        }

        th,
        td {
          padding: 0.45rem;
          font-size: 0.88rem;
        }
      }
    </style>
  </head>
  <body>
    <main class="page">
      <div class="title-row">
        <h1>VS Tracker Page</h1>
        <a class="back-link" href="index.html">Back to Home</a>
      </div>
      <p class="subtitle">
        10-column tracker: Rank, Username, Monday-Saturday, Daily Average, and
        Total Score.
      </p>

      <div class="table-wrap">
        <table aria-label="VS tracker rankings">
          <thead>
            <tr>
              <th>Rank</th>
              <th>Username</th>
              <th>Monday</th>
              <th>Tuesday</th>
              <th>Wednesday</th>
              <th>Thursday</th>
              <th>Friday</th>
              <th>Saturday</th>
              <th>Daily Average</th>
              <th>Total Score</th>
            </tr>
          </thead>
          <tbody id="tracker-body"></tbody>
        </table>
      </div>

      <p id="status-message" class="status" role="status" aria-live="polite">
        Loading tracker data...
      </p>

      <p class="note">Ranks are displayed from 1 to 100.</p>
    </main>

    <script>
      const tableBody = document.getElementById("tracker-body");
      const statusMessage = document.getElementById("status-message");
      const csvUrl =
        "https://docs.google.com/spreadsheets/d/e/2PACX-1vQOJi45FrVzpw00_C8KsQ_qXgYKvhULP_GzqHSKZCIrf0eWPqc3QwLoudLlzfVIvwcAYCNf8JkpAk46/pub?output=csv";
      const expectedColumns = [
        "rank",
        "username",
        "monday",
        "tuesday",
        "wednesday",
        "thursday",
        "friday",
        "saturday",
        "daily average",
        "total score",
      ];

      function setStatus(message, type) {
        statusMessage.textContent = message;
        statusMessage.className = "status";
        if (type) {
          statusMessage.classList.add(type);
        }
      }

      function normalizeHeader(value) {
        return value
          .toLowerCase()
          .trim()
          .replace(/[^a-z0-9]/g, "");
      }

      function parseCsvLine(line) {
        const values = [];
        let current = "";
        let inQuotes = false;

        for (let i = 0; i < line.length; i += 1) {
          const char = line[i];

          if (char === '"') {
            if (inQuotes && line[i + 1] === '"') {
              current += '"';
              i += 1;
            } else {
              inQuotes = !inQuotes;
            }
            continue;
          }

          if (char === "," && !inQuotes) {
            values.push(current);
            current = "";
            continue;
          }

          current += char;
        }

        values.push(current);
        return values;
      }

      function parseCsv(text) {
        return text
          .split(/\r?\n/)
          .filter((line) => line.trim() !== "")
          .map((line) => parseCsvLine(line).map((cell) => cell.trim()));
      }

      function toNumber(value) {
        if (value === null || value === undefined) {
          return null;
        }
        const normalized = String(value).replace(/,/g, "").trim();
        if (normalized === "") {
          return null;
        }
        const num = Number(normalized);
        return Number.isFinite(num) ? num : null;
      }

      function buildHeaderMap(headerRow) {
        const normalizedHeader = headerRow.map((value) =>
          normalizeHeader(value),
        );
        const aliases = {
          rank: ["rank"],
          username: ["username", "user", "name"],
          monday: ["monday", "mon"],
          tuesday: ["tuesday", "tue", "tues"],
          wednesday: ["wednesday", "wed"],
          thursday: ["thursday", "thu", "thur", "thurs"],
          friday: ["friday", "fri"],
          saturday: ["saturday", "sat"],
          "daily average": ["dailyaverage", "average", "avg"],
          "total score": ["totalscore", "total"],
        };

        const map = {};

        for (const key of expectedColumns) {
          const aliasList = aliases[key] || [key];
          map[key] = normalizedHeader.findIndex((headerName) =>
            aliasList.includes(headerName),
          );
        }

        return map;
      }

      function getValue(cells, index) {
        if (index < 0 || index >= cells.length) {
          return "";
        }
        return cells[index] || "";
      }

      function renderRows(rows) {
        tableBody.innerHTML = "";

        function getDailyScoreClass(value) {
          const numericValue = toNumber(value);
          if (numericValue === null) {
            return "";
          }
          if (numericValue < 3600000) {
            return "score-red";
          }
          if (numericValue < 7200000) {
            return "score-orange";
          }
          return "score-green";
        }

        function getWeeklyTotalClass(value) {
          const numericValue = toNumber(value);
          if (numericValue === null) {
            return "";
          }
          if (numericValue < 43200000) {
            return "score-red";
          }
          return "score-green";
        }

        rows.forEach((rowData) => {
          const row = document.createElement("tr");

          rowData.forEach((value, index) => {
            const cell = document.createElement("td");
            cell.textContent = value;
            if (index === 1) {
              cell.className = "name-col";
            }
            if (index >= 2 && index <= 8) {
              const scoreClass = getDailyScoreClass(value);
              if (scoreClass) {
                cell.classList.add(scoreClass);
              }
            }
            if (index === 9) {
              const totalClass = getWeeklyTotalClass(value);
              if (totalClass) {
                cell.classList.add(totalClass);
              }
            }
            row.appendChild(cell);
          });

          tableBody.appendChild(row);
        });
      }

      async function loadTrackerData() {
        try {
          const response = await fetch(csvUrl, { cache: "no-store" });

          if (!response.ok) {
            throw new Error(`HTTP ${response.status}`);
          }

          const csvText = await response.text();
          const parsed = parseCsv(csvText);

          if (parsed.length < 2) {
            throw new Error("CSV is empty or missing data rows.");
          }

          const headerMap = buildHeaderMap(parsed[0]);

          if (headerMap.username === -1) {
            throw new Error("CSV must include a Username column.");
          }

          const dataRows = [];

          for (let i = 1; i < parsed.length; i += 1) {
            const cells = parsed[i];
            const hasAnyValue = cells.some((value) => value.trim() !== "");
            if (!hasAnyValue) {
              continue;
            }

            const username = getValue(cells, headerMap.username);
            const monday = getValue(cells, headerMap.monday);
            const tuesday = getValue(cells, headerMap.tuesday);
            const wednesday = getValue(cells, headerMap.wednesday);
            const thursday = getValue(cells, headerMap.thursday);
            const friday = getValue(cells, headerMap.friday);
            const saturday = getValue(cells, headerMap.saturday);

            let dailyAverage = getValue(cells, headerMap["daily average"]);
            let totalScore = getValue(cells, headerMap["total score"]);

            const dayNumbers = [
              toNumber(monday),
              toNumber(tuesday),
              toNumber(wednesday),
              toNumber(thursday),
              toNumber(friday),
              toNumber(saturday),
            ];
            const validDayNumbers = dayNumbers.filter(
              (value) => value !== null,
            );

            if (!dailyAverage && validDayNumbers.length > 0) {
              const sum = validDayNumbers.reduce(
                (acc, value) => acc + value,
                0,
              );
              dailyAverage = (sum / validDayNumbers.length).toFixed(2);
            }

            if (!totalScore && validDayNumbers.length > 0) {
              totalScore = String(
                validDayNumbers.reduce((acc, value) => acc + value, 0),
              );
            }

            const computedWeeklyTotal =
              toNumber(totalScore) ??
              validDayNumbers.reduce((acc, value) => acc + value, 0);

            dataRows.push({
              username,
              monday,
              tuesday,
              wednesday,
              thursday,
              friday,
              saturday,
              dailyAverage,
              totalScore,
              weeklyTotal: computedWeeklyTotal,
            });
          }

          if (dataRows.length === 0) {
            throw new Error("No valid rows found in the CSV.");
          }

          dataRows.sort((a, b) => b.weeklyTotal - a.weeklyTotal);

          const rankedRows = dataRows
            .slice(0, 100)
            .map((row, index) => [
              index + 1,
              row.username,
              row.monday,
              row.tuesday,
              row.wednesday,
              row.thursday,
              row.friday,
              row.saturday,
              row.dailyAverage,
              row.totalScore,
            ]);

          renderRows(rankedRows);
          setStatus(
            `Loaded ${rankedRows.length} rows, sorted by weekly total. Rank is auto-generated 1-100. Refresh page to fetch latest updates.`,
            "success",
          );
        } catch (error) {
          tableBody.innerHTML = "";
          setStatus(
            `Unable to load tracker data from Google Sheets. ${error.message}`,
            "error",
          );
        }
      }

      loadTrackerData();
    </script>
  </body>
</html>
